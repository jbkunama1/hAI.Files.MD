version: "3.9"

services:
  files-md:
    build:
      context: /opt/filesmd/files.md
      dockerfile: /opt/filesmd/files.md/Dockerfile
    container_name: files-md
    ports:
      - "3333:8080"
    volumes:
      - /opt/filesmd/hAI.Files.MD/app/storage:/app/storage
      - /opt/filesmd/hAI.Files.MD/app/tokens:/app/tokens
    environment:
      - APP_URL=http://MASKED_URL
      - API_URL=http://MASKED_URL
      - STORAGE_DIR=/app/storage
      - TOKENS_DIR=/app/tokens
      - TOKENS_SALT=${TOKENS_SALT}
      - CERT_DIR=
      - LOG_FILE=/app/storage/server.log
      - STORAGE_QUOTA_KB=1024000
    restart: unless-stopped
